name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -q
      - name: Verify features
        run: python scripts/verify_features.py
      - name: Isolation Forest baseline
        run: python scripts/test_isolation_forest.py
      - name: Anomaly model comparison
        run: python scripts/compare_anomaly_models.py
      - name: Detection error analysis
        run: python scripts/analyze_detection_errors.py
